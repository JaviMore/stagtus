name: Release Stagtus Web

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  attach-web-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ZIP
        run: |
          cd stagtus_web
          zip -r ../stagtus-web-${{ github.event.release.tag_name }}.zip . --exclude="*.zip"

      - name: Upload to release
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            stagtus-web-${{ github.event.release.tag_name }}.zip \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}
